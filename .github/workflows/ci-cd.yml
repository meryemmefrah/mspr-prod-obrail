# ============================================================
# Pipeline CI/CD - ObRail Europe
# ============================================================
# Chaîne d'intégration et de livraison continues exécutée
# automatiquement par GitHub Actions.
#
# Déclenchement : à chaque push et chaque pull request sur main.
#
# Étapes (jobs) :
#   1. backend-tests  : tests unitaires + intégration (avec PostgreSQL réel)
#   2. frontend-build : vérifie que le frontend compile
#   3. docker-build   : construit les images Docker (backend + frontend)
#   4. e2e-tests      : lance l'application complète et exécute les tests Cypress
#
# Un job ne démarre que si ceux dont il dépend ont réussi.
# ============================================================

name: CI/CD ObRail

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------
  # 1. Tests du backend (unitaires + intégration)
  # ------------------------------------------------------------
  backend-tests:
    name: Tests backend (pytest)
    runs-on: ubuntu-latest

    # GitHub fournit une base PostgreSQL temporaire le temps des tests.
    # Cela permet d'exécuter aussi les tests d'intégration.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: obrail
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # Attend que la base soit prête avant de lancer les tests.
        options: >-
          --health-cmd "pg_isready -U postgres -d obrail"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dépendances
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialisation de la base de données (tables + données)
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: obrail
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: python scripts/init_db.py

      - name: Exécution des tests
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: obrail
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: python -m pytest -v

  # ------------------------------------------------------------
  # 2. Build du frontend
  # ------------------------------------------------------------
  frontend-build:
    name: Build frontend (React)
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: frontend
        # On ignore le téléchargement du binaire Cypress ici (inutile pour le build).
        env:
          CYPRESS_INSTALL_BINARY: "0"
        run: npm ci

      - name: Build de production
        working-directory: frontend
        run: npm run build

  # ------------------------------------------------------------
  # 3. Construction des images Docker
  # ------------------------------------------------------------
  docker-build:
    name: Build des images Docker
    runs-on: ubuntu-latest
    # Ne s'exécute que si les tests backend et le build frontend ont réussi.
    needs: [backend-tests, frontend-build]

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: obrail-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build de l'image frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: obrail-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------
  # 4. Tests end-to-end (Cypress) sur l'application complète
  # ------------------------------------------------------------
  e2e-tests:
    name: Tests E2E (Cypress)
    runs-on: ubuntu-latest
    needs: [docker-build]

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Création du fichier .env
        run: cp .env.example .env

      - name: Démarrage de la solution complète
        run: docker compose up -d --build

      - name: Attente du démarrage des services
        # Laisse le temps à l'API d'initialiser la base et au frontend d'être prêt.
        run: |
          echo "Attente du démarrage..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API prête."
              break
            fi
            echo "Tentative $i : services pas encore prêts..."
            sleep 5
          done

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installation des dépendances frontend
        working-directory: frontend
        run: npm ci

      - name: Exécution des tests Cypress
        working-directory: frontend
        run: npx cypress run

      - name: Arrêt de la solution
        if: always()
        run: docker compose down
