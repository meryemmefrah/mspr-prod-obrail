# ============================================================
# Configuration Nginx - Frontend ObRail Europe
# ============================================================
# Sert l'application React compilée et gère le routage côté client :
# toute URL inconnue est renvoyée vers index.html, ce qui permet à
# React Router de gérer la navigation (pages /trajets, /sante...).
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # En-têtes de sécurité de base.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Routage SPA : si le fichier n'existe pas, on renvoie index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Mise en cache des ressources statiques (JS, CSS, images).
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
