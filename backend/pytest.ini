# ============================================================
# Configuration pytest - Backend ObRail Europe
# ============================================================
[pytest]
# Le dossier racine des tests.
testpaths = tests

# Ajoute la racine du backend au PYTHONPATH pour que "import api..."
# fonctionne sans manipulation manuelle dans chaque test.
pythonpath = .

# Affichage : verbeux et résumé des tests ignorés/échoués.
addopts = -v -ra

# Marqueurs personnalisés documentés (évite les avertissements).
markers =
    integration: tests d'intégration nécessitant une base de données.
